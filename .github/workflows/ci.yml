name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Libraries (api-zod, db, integrations)
        run: pnpm -r --if-present run build
        
      - name: Build TypeScript Project References
        run: npx tsc -b

      - name: Typecheck Frontend
        run: pnpm --filter @workspace/collab-ide run typecheck

      - name: Typecheck Backend
        run: pnpm --filter @workspace/api-server run typecheck

      - name: Build Frontend
        run: pnpm --filter @workspace/collab-ide run build

      - name: Build Backend
        run: pnpm --filter @workspace/api-server run build
