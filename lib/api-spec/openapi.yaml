      properties:
        totalProjects:
          type: integer
        ownedProjects:
          type: integer
        sharedProjects:
          type: integer
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityLog"
        unreadNotifications:
          type: integer
        recentProjects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
